user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id",'
    '"request":"$request","status":$status,"bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,"upstream":"$upstream_addr","upstream_time":"$upstream_response_time"}';

  access_log /var/log/nginx/access.log json;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 2m;
  server_tokens off;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
  gzip_min_length 1024;

  include /etc/nginx/conf.d/*.conf;
}
