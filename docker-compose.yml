version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: clipdrop-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - clipdrop-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipdrop-backend
    env_file:
      - ./backend/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
      GIN_MODE: release
      PUBLIC_BASE_URL: http://localhost:8088
      CORS_ORIGINS: http://localhost:8088,http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clipdrop-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8088/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8088/api/v1/ws
        NEXT_PUBLIC_MOCK_API: "false"
    container_name: clipdrop-frontend
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - clipdrop-net

  nginx:
    image: nginx:1.27-alpine
    container_name: clipdrop-nginx
    ports:
      - "8088:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/clipdrop.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - clipdrop-net

volumes:
  redis_data:

networks:
  clipdrop-net:
    driver: bridge
