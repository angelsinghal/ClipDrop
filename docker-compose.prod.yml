version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    restart: always
    networks:
      - clipdrop-net

  backend:
    image: ghcr.io/your-org/clipdrop-backend:latest
    env_file:
      - ./backend/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
      GIN_MODE: release
      PUBLIC_BASE_URL: https://clipdrop.example.com
      CORS_ORIGINS: https://clipdrop.example.com
    depends_on:
      - redis
    restart: always
    networks:
      - clipdrop-net

  frontend:
    image: ghcr.io/your-org/clipdrop-frontend:latest
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://clipdrop.example.com/api/v1
      NEXT_PUBLIC_WS_URL: wss://clipdrop.example.com/api/v1/ws
      NEXT_PUBLIC_MOCK_API: "false"
    restart: always
    networks:
      - clipdrop-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/clipdrop.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - clipdrop-net

volumes:
  redis_data:

networks:
  clipdrop-net:
    driver: bridge
